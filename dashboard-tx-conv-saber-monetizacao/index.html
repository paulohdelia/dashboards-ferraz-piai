<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Safra - Conversão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>Dashboard de Conversão de Safra</h1>
                    <p class="last-update">Última atualização: <span id="lastUpdate">-</span></p>
                </div>
                <button id="refreshBtn" class="refresh-btn" onclick="forceRefresh()" title="Forçar atualização dos dados">
                    🔄 Atualizar
                </button>
            </div>
        </header>

        <!-- Scorecards -->
        <section class="scorecards">
            <div class="scorecard">
                <div class="scorecard-label">Total de Leads</div>
                <div class="scorecard-value" id="totalLeads">-</div>
            </div>
            <div class="scorecard">
                <div class="scorecard-label">Leads Monetizados</div>
                <div class="scorecard-value" id="totalMonetizados">-</div>
            </div>
            <div class="scorecard">
                <div class="scorecard-label">Taxa de Conversão Média</div>
                <div class="scorecard-value" id="avgConversion">-</div>
            </div>
        </section>

        <!-- Visão de Safra -->
        <section class="chart-section">
            <h2>Visão de Safra - Taxa de Conversão</h2>
            <div id="safraChart"></div>
        </section>

        <!-- Tabela de Dados -->
        <section class="table-section">
            <h2>Detalhamento por Safra</h2>
            <div class="table-wrapper">
                <table id="safraTable">
                    <thead>
                        <tr>
                            <th>Safra</th>
                            <th>Total de Leads</th>
                            <th>Leads Monetizados</th>
                            <th>Taxa de Conversão</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="4" class="loading">Carregando dados...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
